<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post Method</title>
</head>
<body>
    <h2>Add Student</h2>

    <input type="text" id="name" placeholder="Enter Name">
    <input type="text" id="course" placeholder="Enter Course">

    <button onclick="addStudent()">Add</button>

     <h2>Student List</h2>

    <button onclick="getStudent()">Load Student</button>

    <ul id="studentList"></ul>
    
    <script>
        async function addStudent() {
            let name = document.getElementById("name").value;            
            let course = document.getElementById("course").value;
            
            await fetch("http://localhost:3000/students",{
                method:"POST",
                headers:{
                    "Content-Type":"application/json"
                },
                body:JSON.stringify({
                    name:name,  // Key in json : variable in js
                    course:course  // Key in json : variable in js
                })
            })
            alert("Student Added Successfully");

        }

        async function getStudent() {
            let response = await fetch("http://localhost:3000/students");  // fetch method it take by default get method
            let students =await response.json();

            let list = document.getElementById("studentList");
            list.innerHTML = "";

            students.forEach(function(student){
                let li = document.createElement("li");
                li.textContent = student.name + " - " + student.course;

                list.appendChild(li);
            })
        }
    </script>
</body>
</html>
